server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: price-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/fuelyn-prices;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    # ─── HikariCP tuning (Phase B2) ──────────────────────────
    # Default pool size is 10. With 4 collection workers + Kafka
    # consumer + the public read traffic, 10 connections gets
    # contended quickly. 20 is a sane upper bound for a single
    # Postgres instance running on commodity hardware.
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONN_TIMEOUT_MS:10000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_MS:30000}
  jpa:
    hibernate:
      # Flyway owns the schema. Hibernate only validates the mapping.
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        # batch_size on its own only batches statements that are
        # *contiguous* in the action queue. Without ordering flags
        # Hibernate emits inserts in the order of EntityManager.persist
        # calls — which for the collection hot path interleaves
        # PriceSnapshot and StationMeta and shrinks the effective batch
        # back to ~1. order_inserts/order_updates groups the action
        # queue by entity type so the JDBC driver gets long runs of
        # same-shape statements that can actually be batched.
        order_inserts: true
        order_updates: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    # Some past branches applied migrations (V2..V4) whose SQL
    # files don't exist on `main` (those features moved or were
    # archived). Flyway's default validation refuses to start in
    # that state. The setting below tells it to tolerate "applied
    # but no longer in source" entries — we still fully validate
    # the migrations that ARE present, and new ones (V5+) still
    # apply normally.
    ignore-migration-patterns: "*:missing"
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

fuelyn:
  security:
    hmac-secret: ${HMAC_SECRET:}
    service-id: price-service
    api-keys:
      - ${API_KEY_1:}
  tankerkoenig:
    api-key: ${TANKERKOENIG_API_KEY:}
    base-url: ${TANKERKOENIG_BASE_URL:https://creativecommons.tankerkoenig.de}
    timeout-ms: ${TANKERKOENIG_TIMEOUT_MS:5000}
    retry-count: 3
    retry-delay-ms: 2000
  openchargemap:
    api-key: ${OPENCHARGEMAP_API_KEY:}
  collection:
    enabled: ${COLLECTION_ENABLED:true}
    cron: "0 */30 * * * *"
    radius-km: 10
    max-history-days: 90
    # Polling grid — explicitly overrides PriceCollectorService.DEFAULT_CITIES
    # when present. Each entry is name + lat/lng (decimal degrees, WGS-84).
    # Coordinates outside Germany's bounding box (47–55 N, 5.5–15.5 E) are
    # logged and dropped at startup, the rest still apply. Leave empty / unset
    # to use the built-in 10-city default grid.
    cities: []
    #   - name: Berlin
    #     lat: 52.5200
    #     lng: 13.4050
    #   - name: Hamburg
    #     lat: 53.5511
    #     lng: 9.9937
  # ─── Streaming bus (Kafka / Redpanda) ─────────────────────
  # Producer publishes price-update deltas; consumer fans them out
  # to SSE subscribers (live UI updates) and the alerts processor.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:redpanda:29092}
    prices-topic: ${KAFKA_PRICES_TOPIC:fuelyn.prices.v1}
    publisher:
      enabled: ${KAFKA_PUBLISHER_ENABLED:true}
    consumer:
      enabled: ${KAFKA_CONSUMER_ENABLED:true}
      group-id: ${KAFKA_CONSUMER_GROUP:price-service-stream}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,https://localhost:3000}

resilience4j:
  circuitbreaker:
    instances:
      tankerkoenig:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      openchargemap:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      tankerkoenig:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - org.springframework.web.client.ResourceAccessException
  ratelimiter:
    instances:
      # ─── Tankerkönig + OpenChargeMap rate limit ───────────────────
      # Tankerkönig docs cap requests at ≤ 5 req/s globally. We size
      # the bucket to 240/min (= 4 req/s steady state) to leave 20 %
      # headroom for retries and bursts. With 4 500 polling points
      # this gives ~19 min wall time per cycle, comfortably under
      # the 30-min cron tick. The defaults can be overridden via
      # env vars without rebuilding the image.
      external-api:
        limit-for-period: ${RATELIMIT_EXTERNAL_API_PERIOD:240}
        limit-refresh-period: ${RATELIMIT_EXTERNAL_API_REFRESH:1m}
        timeout-duration: ${RATELIMIT_EXTERNAL_API_TIMEOUT:30s}

# Management endpoints on SEPARATE port so nothing is accessible externally
# unless explicitly exposed at the ingress.
management:
  server:
    port: ${MANAGEMENT_PORT:9081}
    # Only bind to loopback; containers / k8s probe via service port.
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
