server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ai-service
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=200,expireAfterWrite=900s

  # ─── Datasource (regret-loop telemetry only) ──────────────
  # ai-service is otherwise stateless; the only reason it owns a
  # JDBC pool is to INSERT into `recommendation_logs` (schema
  # owned by price-service via Flyway, see V5). Pool kept tiny —
  # writes are infrequent and fire-and-forget.
  #
  # When the env var REGRET_DB_ENABLED=false (or no datasource
  # URL is configured) we silently skip the persistence layer
  # and fall back to JSON-only logging. Configured via
  # `spring.autoconfigure.exclude` below in that case.
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      pool-name: ai-service-regret
      maximum-pool-size: 3
      minimum-idle: 0
      idle-timeout: 60000
      connection-timeout: 5000
  autoconfigure:
    # Guard: if no datasource URL is set, skip JDBC autoconfig
    # entirely so the service still boots in environments without
    # a DB (CI, dev with `REGRET_DB_ENABLED=false`, etc.). The
    # property is overridden via env in docker-compose.
    exclude: ${SPRING_AUTOCONFIGURE_EXCLUDE:}

fuelyn:
  security:
    hmac-secret: ${HMAC_SECRET:}
    jwt-public-key: ${JWT_PUBLIC_KEY:}
    jwt-private-key: ${JWT_PRIVATE_KEY:}
    service-id: ai-service

  # ─── Regret-loop telemetry ──────────────────────────────────
  # When enabled, every advisor verdict is also written to the
  # `recommendation_logs` table (in addition to the JSON log
  # line). A nightly cron in price-service then backfills the
  # 24-h realised minimum and the resulting regret value. Both
  # the persistence and the cron are independently toggleable
  # so we can ship the write side first and turn the loop on
  # later. Disabled by default; `docker-compose.yml` flips it
  # on for the dev stack.
  regret:
    enabled: ${REGRET_DB_ENABLED:false}

  # ─── AI tiered pipeline ─────────────────────────────────────
  # Pipeline: cache → heuristic baseline → enrichment chain.
  # `providers` is a CSV in priority order — each backend is tried
  # until one succeeds. With nothing configured we degrade to the
  # pure deterministic heuristic.
  ai:
    enrichment:
      enabled: ${AI_ENRICHMENT_ENABLED:true}
    providers: ${AI_PROVIDERS:ollama,openai}
    cache:
      max-size: ${AI_CACHE_MAX:200}
      ttl-minutes: ${AI_CACHE_TTL_MIN:15}

    ollama:
      enabled: ${OLLAMA_ENABLED:true}
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      # Default = Premium-local profile (~5 GB disk, ~8–10 GB RAM).
      # Switch to qwen2.5:3b-instruct via env for the slim profile.
      model: ${OLLAMA_MODEL:qwen2.5:7b-instruct}
      temperature: ${OLLAMA_TEMPERATURE:0.4}
      # 7B model on CPU: 60 s gives headroom for cold inference;
      # warm calls return in 2–6 s.
      timeout-ms: ${OLLAMA_TIMEOUT_MS:60000}

    openai:
      enabled: ${OPENAI_ENABLED:false}
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      max-tokens: 400
      temperature: 0.6
      timeout-ms: ${OPENAI_TIMEOUT_MS:30000}

  # ─── Streaming bus consumer ────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:redpanda:29092}
    prices-topic: ${KAFKA_PRICES_TOPIC:fuelyn.prices.v1}
    consumer:
      enabled: ${KAFKA_CONSUMER_ENABLED:true}
      group-id: ${KAFKA_CONSUMER_GROUP:ai-service}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,https://localhost:3000}

resilience4j:
  circuitbreaker:
    instances:
      openai:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
      ollama:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 30s
  retry:
    instances:
      openai:
        max-attempts: 2
        wait-duration: 3s
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
      ollama:
        max-attempts: 2
        wait-duration: 1s
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException

management:
  server:
    port: ${MANAGEMENT_PORT:9082}
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
