server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ai-service
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=200,expireAfterWrite=900s

tankpilot:
  security:
    hmac-secret: ${HMAC_SECRET:}
    jwt-public-key: ${JWT_PUBLIC_KEY:}
    jwt-private-key: ${JWT_PRIVATE_KEY:}
    service-id: ai-service
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    max-tokens: 800
    temperature: 0.7
    timeout-ms: ${OPENAI_TIMEOUT_MS:30000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,https://localhost:3000}

resilience4j:
  circuitbreaker:
    instances:
      openai:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
  retry:
    instances:
      openai:
        max-attempts: 2
        wait-duration: 3s
        retry-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException

management:
  server:
    port: ${MANAGEMENT_PORT:9082}
    address: 127.0.0.1
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
