# ============================================================
# Fuelyn — Local development stack.
#
# All ports are deliberately non-default (defense in depth +
# avoids common port-scanner targets like 80/443/3000/5432/8080).
#
# Public (host-facing) ports:
#   49443 → Caddy HTTPS
#   49080 → Caddy HTTP (always 301 → HTTPS)
#
# Internal ports (compose network only — never exposed to host):
#   23700 → web (Next.js standalone)
#   25432 → postgres
#   28800 → gateway       (mgmt 29800)
#   28810 → price-service (mgmt 29810)
#   28820 → ai-service    (mgmt 29820)
#
# Public:
#   https://localhost:49443       → web (Next.js)
#   https://api.localhost:49443   → gateway (Spring Cloud Gateway)
#
# After first start, run once to remove browser warnings:
#   ./scripts/trust-caddy-cert.sh
#
# ─── Resource policy ────────────────────────────────────────
# This file intentionally ships WITHOUT any `deploy.resources.
# limits` blocks: every container is free to use whatever the
# host has spare. Soft hints (Redpanda's `--memory`, Ollama's
# parallelism env) sit at generous defaults and are all
# overridable via .env if you need to be nicer to the host.
#
# The "Container memory usage: X / Y GB" you see in the Docker
# Desktop dashboard is the WSL2 VM ceiling, NOT a compose cap.
# To lift it, copy infra/docker/wslconfig.template to
# %USERPROFILE%\.wslconfig and run `wsl --shutdown`. See that
# file for tuning notes per host size.
# ============================================================
name: fuelyn

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      gateway:
        condition: service_healthy
    ports:
      - "49080:49080"
      - "49443:49443"
      - "49443:49443/udp"        # HTTP/3
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1:49443 2>/dev/null | head -c 1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Streaming bus (Redpanda) ──────────────────────────────
  # Kafka-protocol-compatible single-binary broker. ~256 MB RAM
  # idle, zero ZooKeeper, schema registry built-in. Used to fan
  # out price updates from price-service to every consumer
  # (ai-service cache invalidation, alerts, future SSE bridge).
  #
  # Topics are auto-created with sensible defaults; for production
  # we'd manage them via terraform / rpk.
  redpanda:
    image: redpandadata/redpanda:v24.3.4
    restart: unless-stopped
    # ─── Resource hints, not caps ────────────────────────────
    # Redpanda's `--memory` flag is a SOFT target it sizes its
    # internal pools against. We give it a generous working set
    # (4 GB) that elastic loads can grow into without OOM —
    # no `deploy.resources.limits` block, so the container uses
    # host memory dynamically up to whatever Docker has available.
    # The CPU `--smp` is also hint-level: with `--overprovisioned`
    # Seastar shares cores cooperatively, so a higher number
    # lets Redpanda spread work across more host cores when idle.
    # All defaults can be overridden via .env if you need to be
    # nicer to the host (e.g. REDPANDA_SMP=2, REDPANDA_MEMORY_HINT=1G).
    command:
      - redpanda
      - start
      - --smp=${REDPANDA_SMP:-4}
      - --memory=${REDPANDA_MEMORY_HINT:-4G}
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=redpanda:8082
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    expose:
      - "29092"   # Kafka API (in-cluster)
      - "8082"    # Pandaproxy
      - "9644"    # Admin
    healthcheck:
      # Greps the cluster-health overview for "Healthy: true" — robust
      # across rpk versions and doesn't depend on flag conventions.
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "port=25432"]
    environment:
      POSTGRES_DB: fuelyn
      POSTGRES_USER: fuelyn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      PGPORT: "25432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # One-shot bootstrap that creates the `fuelyn_web` database for the
      # web BFF (Prisma). Runs only when pgdata is first initialised —
      # see the script header for the existing-volume caveat.
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    expose:
      - "25432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 25432 -U fuelyn -d fuelyn"]
      interval: 5s
      timeout: 5s
      retries: 10

  price-service:
    build:
      context: ./backend
      dockerfile: price-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "28810"
      MANAGEMENT_PORT: "29810"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:25432/fuelyn
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: fuelyn
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      KAFKA_PRICES_TOPIC: fuelyn.prices.v1
      KAFKA_PUBLISHER_ENABLED: ${KAFKA_PUBLISHER_ENABLED:-true}
      HMAC_SECRET: ${HMAC_SECRET:?HMAC_SECRET required}
      API_KEY_1: ${API_KEY_1}
      TANKERKOENIG_API_KEY: ${TANKERKOENIG_API_KEY}
      OPENCHARGEMAP_API_KEY: ${OPENCHARGEMAP_API_KEY}
      # ─── Regret-loop nightly backfill ──────────────────────
      # Reads `recommendation_logs` rows older than 24 h, looks
      # up the cheapest price observed in the same lat/lng
      # bucket within the 24 h after the request, and writes
      # `regret_eur` so we have an empirical signal for tuning
      # the Bayesian prior weights.
      FUELYN_REGRET_BACKFILL_ENABLED: ${REGRET_BACKFILL_ENABLED:-true}
    expose:
      - "28810"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:29810/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ─── Local LLM (Ollama) — Premium-local profile ────────────
  # Default model: qwen2.5:7b-instruct (~4.7 GB on disk, ≈8–10 GB
  # resident when loaded). For our enrichment workload this is
  # essentially indistinguishable from gpt-4o-mini in quality while
  # running entirely on the host — no third-party data egress, no
  # per-request cost, works offline.
  #
  # Resource budget (recommend 8+ CPU cores, 12 GB free RAM):
  #   • OLLAMA_NUM_PARALLEL=2   → two concurrent inferences. Higher
  #     than 1 only helps when the host has spare CPU/RAM headroom;
  #     on a memory-constrained host raise OLLAMA_MEMORY_LIMIT or
  #     drop this back to 1 via .env.
  #   • OLLAMA_MAX_LOADED_MODELS=1
  #     (one model in memory at a time — raising costs ~10 GB/model)
  #   • OLLAMA_KEEP_ALIVE=2h    → model stays resident across
  #     idle gaps so we don't pay the 5–15 s cold-load latency
  #     on every burst.
  #
  # Override OLLAMA_MODEL=qwen2.5:3b-instruct in .env if you need
  # the slim profile (~2 GB disk, ~4 GB RAM).
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-2h}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-2}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-1}
      # Queue depth — generous default so bursts don't get 429'd.
      # Each queued request is a few kB, so 64 is essentially free.
      OLLAMA_MAX_QUEUE: ${OLLAMA_MAX_QUEUE:-64}
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    # ─── No hard memory cap by default ───────────────────────
    # Earlier we capped at 12 GB to protect the host from a
    # runaway model swap. With a single 7B model + KV cache
    # the steady-state working set is ~9 GB; a hard cap that
    # close to working set just makes Docker OOM-kill the
    # container on benign bursts. We now ship without limits
    # so Ollama uses whatever the host has free, and operators
    # who care about isolation can re-enable the cap by
    # exporting OLLAMA_MEMORY_LIMIT in .env.
    #
    # Re-enable example (paste into .env):
    #   OLLAMA_MEMORY_LIMIT=14G
    # and uncomment the deploy block below.
    # deploy:
    #   resources:
    #     limits:
    #       memory: ${OLLAMA_MEMORY_LIMIT:-14G}

  # One-shot init: pulls the model into the named volume AND triggers
  # a tiny warm-up inference so the first real user request doesn't
  # eat the cold-load latency (5–15 s for a 7B model on CPU).
  # Re-runs are cheap because layers + warm tensors are cached.
  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct}
    entrypoint:
      - "sh"
      - "-c"
      - |
        set -e
        echo "[init] pulling $${OLLAMA_MODEL}"
        ollama pull "$${OLLAMA_MODEL}"
        echo "[init] warming up $${OLLAMA_MODEL} (single token)"
        ollama run "$${OLLAMA_MODEL}" --keepalive 2h "ok" >/dev/null 2>&1 || true
        echo "[init] done"
    volumes:
      - ollama_data:/root/.ollama

  ai-service:
    build:
      context: ./backend
      dockerfile: ai-service/Dockerfile
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      # The model must be pulled + warmed by ollama-init before ai-service
      # serves traffic — otherwise the first request races the warm-up.
      ollama-init:
        condition: service_completed_successfully
      redpanda:
        condition: service_healthy
      # Telemetry write-side: ai-service inserts into
      # `recommendation_logs`, owned by price-service's Flyway. We
      # depend on postgres-healthy so the migration has run before
      # the first INSERT lands.
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "28820"
      MANAGEMENT_PORT: "29820"
      HMAC_SECRET: ${HMAC_SECRET}
      # Tiered AI pipeline: try Ollama first, OpenAI second.
      # Set AI_PROVIDERS=heuristic to disable LLM enrichment entirely.
      AI_ENRICHMENT_ENABLED: ${AI_ENRICHMENT_ENABLED:-true}
      AI_PROVIDERS: ${AI_PROVIDERS:-ollama,openai}
      OLLAMA_ENABLED: "true"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct}
      # 7B model on CPU can take 8–25 s for the first inference per
      # warm session. Give the HTTP client enough headroom.
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-60000}
      # OpenAI fallback — opt-in. Without an API key the bean is not
      # registered and the orchestrator silently skips this tier.
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Streaming consumer
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      KAFKA_PRICES_TOPIC: fuelyn.prices.v1
      KAFKA_CONSUMER_ENABLED: ${KAFKA_CONSUMER_ENABLED:-true}
      # ─── Regret-loop telemetry write-side ──────────────────
      # Persists every advisor verdict in `recommendation_logs`
      # (privacy-preserving: only 0.01° lat/lng buckets, no
      # user/device ID). Set to "false" to fall back to JSON-only.
      REGRET_DB_ENABLED: ${REGRET_DB_ENABLED:-true}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:25432/fuelyn
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: fuelyn
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "28820"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:29820/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      price-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "28800"
      MANAGEMENT_PORT: "29800"
      PRICE_SERVICE_URI: http://price-service:28810
      AI_SERVICE_URI: http://ai-service:28820
      FUELYN_HMAC_SECRET: ${HMAC_SECRET}
      FUELYN_API_KEY: ${API_KEY_1}
      CORS_ORIGINS: https://localhost:49443,https://api.localhost:49443,https://fuelyn.localhost:49443,https://api.fuelyn.localhost:49443
    expose:
      - "28800"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:29800/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ─── Web schema migration (one-shot) ───────────────────────
  # Applies the Prisma schema to the `fuelyn_web` Postgres database
  # before the web service starts. Reuses the web image's *builder*
  # stage (which carries the Prisma CLI; the slim runner does not),
  # so no extra image to maintain. Exits 0 on success — `web` waits
  # for that via service_completed_successfully.
  web-migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fuelyn:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:25432/fuelyn_web
    # No --accept-data-loss in the prod stack: a destructive schema change must
    # FAIL this migrate job (fail-safe) instead of silently dropping data. A
    # proper `prisma migrate deploy` history is the recommended follow-up.
    command:
      - sh
      - -c
      - cd apps/web && npx prisma db push --skip-generate

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
      web-migrate:
        condition: service_completed_successfully
    environment:
      # Persistence is Postgres now (the Iter-AH SQLite caveat is gone),
      # so the container runs in real production mode. The production DB
      # guard in lib/db/client.ts is satisfied by the postgresql:// URL
      # below. Override with WEB_NODE_ENV if you ever need dev semantics.
      NODE_ENV: ${WEB_NODE_ENV:-production}
      PORT: "23700"
      HOSTNAME: "0.0.0.0"
      JAVA_BACKEND_URL: http://gateway:28800
      JAVA_BACKEND_API_KEY: ${API_KEY_1}
      # API base — clients hit this from the browser. Override in .env
      # to point at the dev alias (PUBLIC_HOSTNAME=fuelyn.localhost) once
      # you've added the hosts-file entry.
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://localhost:49443}
      CRON_SECRET: ${CRON_SECRET}
      TANKERKOENIG_API_KEY: ${TANKERKOENIG_API_KEY}
      RATE_LIMIT_TRUST_PROXY: "1"
      # ─── Iter AH security-hardening env ────────────────────
      # Without these the web container would crash at import-
      # time in production mode (see lib/auth/jwt.ts +
      # lib/config/runtime.ts). Read from the root .env.
      FUELYN_JWT_SECRET: ${FUELYN_JWT_SECRET:?FUELYN_JWT_SECRET required}
      FUELYN_PUBLIC_ORIGIN: ${FUELYN_PUBLIC_ORIGIN:-https://localhost:49443}
      FUELYN_ADMIN_TOKEN: ${FUELYN_ADMIN_TOKEN}
      # ─── Cloud-sync persistence (Prisma → Postgres) ────────
      # The web BFF owns its own `fuelyn_web` database on the shared
      # Postgres server; `web-migrate` applies the schema first. User /
      # SyncRecord / Subscription / Telemetry state lives there.
      DATABASE_URL: postgresql://fuelyn:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:25432/fuelyn_web
    expose:
      - "23700"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:23700 2>/dev/null | head -c 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  ollama_data:
