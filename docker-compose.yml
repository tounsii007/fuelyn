# ============================================================
# TankPilot — Local development stack.
#
# All ports are deliberately non-default (defense in depth +
# avoids common port-scanner targets like 80/443/3000/5432/8080).
#
# Public (host-facing) ports:
#   49443 → Caddy HTTPS
#   49080 → Caddy HTTP (always 301 → HTTPS)
#
# Internal ports (compose network only — never exposed to host):
#   23700 → web (Next.js standalone)
#   25432 → postgres
#   28800 → gateway       (mgmt 29800)
#   28810 → price-service (mgmt 29810)
#   28820 → ai-service    (mgmt 29820)
#
# Public:
#   https://localhost:49443       → web (Next.js)
#   https://api.localhost:49443   → gateway (Spring Cloud Gateway)
#
# After first start, run once to remove browser warnings:
#   ./scripts/trust-caddy-cert.sh
# ============================================================
name: tankpilot

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      gateway:
        condition: service_healthy
    ports:
      - "49080:49080"
      - "49443:49443"
      - "49443:49443/udp"        # HTTP/3
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1:49443 2>/dev/null | head -c 1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "port=25432"]
    environment:
      POSTGRES_DB: tankpilot
      POSTGRES_USER: tankpilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      PGPORT: "25432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "25432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 25432 -U tankpilot -d tankpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  price-service:
    build:
      context: ./backend
      dockerfile: price-service/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "28810"
      MANAGEMENT_PORT: "29810"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:25432/tankpilot
      SPRING_DATASOURCE_DRIVER: org.postgresql.Driver
      SPRING_DATASOURCE_USERNAME: tankpilot
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      HMAC_SECRET: ${HMAC_SECRET:?HMAC_SECRET required}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY required}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY required}
      API_KEY_1: ${API_KEY_1}
      TANKERKOENIG_API_KEY: ${TANKERKOENIG_API_KEY}
      OPENCHARGEMAP_API_KEY: ${OPENCHARGEMAP_API_KEY}
    expose:
      - "28810"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:29810/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ─── Local LLM (Ollama) ────────────────────────────────────
  # Provides an OpenAI-compatible /api/chat endpoint backed by a
  # small instruction-tuned model. The ai-service prefers this over
  # OpenAI so that no Tankerkönig data leaves the host and per-request
  # cost is zero. Falls through to OpenAI if unavailable.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_KEEP_ALIVE: "30m"
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s

  # One-shot init: pulls the model into the named volume on first boot.
  # Re-runs are no-ops because Ollama caches model layers.
  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b-instruct}
    entrypoint: ["sh", "-c", "echo \"[init] pulling ${OLLAMA_MODEL:-qwen2.5:3b-instruct}\" && ollama pull ${OLLAMA_MODEL:-qwen2.5:3b-instruct} && echo \"[init] done\""]
    volumes:
      - ollama_data:/root/.ollama

  ai-service:
    build:
      context: ./backend
      dockerfile: ai-service/Dockerfile
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "28820"
      MANAGEMENT_PORT: "29820"
      HMAC_SECRET: ${HMAC_SECRET}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      # Tiered AI pipeline: try Ollama first, OpenAI second.
      # Set AI_PROVIDERS=heuristic to disable LLM enrichment entirely.
      AI_ENRICHMENT_ENABLED: ${AI_ENRICHMENT_ENABLED:-true}
      AI_PROVIDERS: ${AI_PROVIDERS:-ollama,openai}
      OLLAMA_ENABLED: "true"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b-instruct}
      # OpenAI fallback — opt-in. Without an API key the bean is not
      # registered and the orchestrator silently skips this tier.
      OPENAI_ENABLED: ${OPENAI_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    expose:
      - "28820"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:29820/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      price-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "28800"
      MANAGEMENT_PORT: "29800"
      PRICE_SERVICE_URI: http://price-service:28810
      AI_SERVICE_URI: http://ai-service:28820
      TANKPILOT_HMAC_SECRET: ${HMAC_SECRET}
      TANKPILOT_JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      TANKPILOT_JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      TANKPILOT_API_KEY: ${API_KEY_1}
      CORS_ORIGINS: https://localhost:49443,https://api.localhost:49443
    expose:
      - "28800"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:29800/actuator/health/readiness | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "23700"
      HOSTNAME: "0.0.0.0"
      JAVA_BACKEND_URL: http://gateway:28800
      JAVA_BACKEND_API_KEY: ${API_KEY_1}
      NEXT_PUBLIC_API_BASE: https://localhost:49443
      CRON_SECRET: ${CRON_SECRET}
      TANKERKOENIG_API_KEY: ${TANKERKOENIG_API_KEY}
      RATE_LIMIT_TRUST_PROXY: "1"
    expose:
      - "23700"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:23700 2>/dev/null | head -c 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  ollama_data:
