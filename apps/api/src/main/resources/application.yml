server:
  port: 8080

spring:
  application:
    name: tankpilot-api
  datasource:
    url: jdbc:h2:file:./data/tankpilot;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

tankpilot:
  tankerkoenig:
    api-key: ${TANKERKOENIG_API_KEY:00000000-0000-0000-0000-000000000002}
    base-url: https://creativecommons.tankerkoenig.de
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: gpt-4o-mini
    max-tokens: 800
  collection:
    enabled: true
    cron: "0 0 * * * *"
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,https://localhost:3000,https://localhost:3001
