# ============================================================
# Dependabot — Phase E
#
# Strategy:
#   • Group minor/patch bumps to keep PR noise low (one PR per
#     ecosystem per week).
#   • Major bumps go into individual PRs because they typically
#     require code changes.
#   • Security updates are always individual + immediate.
# ============================================================

version: 2
updates:
  # ─── Frontend (apps/web + packages/*) ─────────────────────
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']
      eslint:
        patterns: ['eslint*', '@typescript-eslint/*']
    ignore:
      # React 19 is recent — let it stabilise before tracking
      # bleeding-edge minor releases.
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      # Expo-managed native modules (apps/mobile). Their versions are
      # dictated by the installed Expo SDK (see `expo install --check` /
      # Expo's bundledNativeModules), not by plain semver. Left to
      # Dependabot, caret ranges drift them off the SDK pin: async-storage
      # had already reached 3.x (SDK 56 wants 2.2.0) and safe-area 5.8.0
      # (wants ~5.7.0). Pin them here; they move only via
      # `expo install --fix` during a deliberate SDK upgrade.
      - dependency-name: 'react-native'
      - dependency-name: '@react-native-async-storage/async-storage'
      - dependency-name: 'react-native-screens'
      - dependency-name: 'react-native-safe-area-context'
      - dependency-name: 'react-native-maps'
    labels:
      - 'dependencies'
      - 'frontend'

  # ─── Backend (Maven) ──────────────────────────────────────
  - package-ecosystem: 'maven'
    directory: '/backend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:30'
      timezone: 'Europe/Berlin'
    open-pull-requests-limit: 5
    groups:
      spring-boot:
        patterns: ['org.springframework*']
      minor-and-patch:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      # Spring Boot 4.x drops spring-boot-starter-aop from default BOM in
      # some configs (price-service) and reorganizes the actuator package
      # tree. Pin to 3.x line; tracked in roadmap.
      - dependency-name: 'org.springframework.boot:*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'org.springframework.cloud:*'
        update-types: ['version-update:semver-major']
    labels:
      - 'dependencies'
      - 'backend'

  # ─── GitHub Actions ───────────────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'ci'

  # ─── Docker base images ───────────────────────────────────
  - package-ecosystem: 'docker'
    directory: '/backend/price-service'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'docker']
  - package-ecosystem: 'docker'
    directory: '/backend/ai-service'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'docker']
  - package-ecosystem: 'docker'
    directory: '/backend/gateway'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'docker']
  - package-ecosystem: 'docker'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
    labels: ['dependencies', 'docker']
