name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'

jobs:
  # ─── TypeScript / Frontend ──────────────────────────────
  typescript:
    name: TypeScript Lint + Test + Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: ESLint
        run: npx eslint apps/web/src packages/core/src

      - name: TypeScript — packages/core
        run: npx tsc --noEmit -p packages/core/tsconfig.json

      - name: TypeScript — apps/web
        run: npx tsc --noEmit -p apps/web/tsconfig.typecheck.json

      - name: Vitest — packages/core
        run: npm test --workspace=@fuelyn/core

      - name: Vitest — apps/web
        run: npm test --workspace=@fuelyn/web

  # ─── Java / Backend ─────────────────────────────────────
  java:
    name: Java Compile + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Spotless format check
        run: mvn -B -ntp -f backend/pom.xml spotless:check

      - name: Compile
        run: mvn -B -ntp -f backend/pom.xml -DskipTests install

      - name: Test
        run: mvn -B -ntp -f backend/pom.xml test

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/**/target/surefire-reports/

  # ─── Docker build smoke test ────────────────────────────
  docker:
    name: Docker Build (smoke)
    runs-on: ubuntu-latest
    needs: [typescript, java]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build price-service image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/price-service/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
