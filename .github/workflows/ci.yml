name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'

jobs:
  # ─── TypeScript / Frontend ──────────────────────────────
  typescript:
    name: TypeScript Lint + Test + Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install
        run: npm ci

      # Prisma 7 generates a fresh client into node_modules/@prisma/client
      # on `prisma generate`. Without this step the TypeScript type-check
      # below sees `PrismaClient` as a non-existent export (TS2305) and
      # every consumer file becomes a cascade of "Property X does not
      # exist on type {}".
      - name: Prisma generate (apps/web)
        run: npx prisma generate --schema apps/web/prisma/schema.prisma

      - name: ESLint
        run: npx eslint apps/web/src packages/core/src apps/mobile/src

      - name: TypeScript — packages/core
        run: npx tsc --noEmit -p packages/core/tsconfig.json

      # Was non-blocking while ~18 implicit-any TS errors lived in the
      # apps/web route handlers; all clear now that `prisma generate`
      # runs first and the Prisma 7 client types resolve. Re-gated.
      - name: TypeScript — apps/web
        run: npx tsc --noEmit -p apps/web/tsconfig.typecheck.json

      # Expo/React-Native stub. Type-checked against its own tsconfig
      # (jsx: react-jsx, src/**). This gates the TS *code*; the Expo-SDK
      # dependency alignment is gated by the next step.
      - name: TypeScript — apps/mobile
        run: npx tsc --noEmit -p apps/mobile/tsconfig.json

      # Expo-SDK dependency alignment gate. `expo install --check` is the
      # deterministic, offline core of `expo-doctor`: it validates each
      # native module in apps/mobile against the installed Expo SDK's
      # bundledNativeModules and exits 1 on drift. This is what catches a
      # Dependabot bump that moves a native module off the SDK pin (how
      # async-storage reached 3.x and safe-area 5.8.0 past SDK 56's
      # 2.2.0 / ~5.7.0). `typescript` and `react` are intentionally ahead
      # of the SDK and exempted via expo.install.exclude in
      # apps/mobile/package.json.
      - name: Expo SDK alignment — apps/mobile
        working-directory: apps/mobile
        run: npx --no-install expo install --check

      # Was non-blocking while price-prediction.test.ts couldn't pass.
      # The root cause was recentTrendSlope using Date.now() instead of
      # the options.now passed in by the test — fixed; re-gated.
      #
      # `--coverage` enforces the per-workspace thresholds declared in
      # each vitest.config.ts (a regression floor, not a vanity target —
      # core ~78%, web ~14%; see the configs). The plain `npm test` the
      # pre-push hook runs stays coverage-free so the hook is fast.
      - name: Vitest + coverage — packages/core
        run: npm test --workspace=@fuelyn/core -- --coverage

      - name: Vitest + coverage — apps/web
        run: npm test --workspace=@fuelyn/web -- --coverage

  # ─── Java / Backend ─────────────────────────────────────
  java:
    name: Java Compile + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      # Strict: a `spotless:apply` sweep has landed, so any new formatting
      # drift now fails the build (google-java-format AOSP, import ordering,
      # unused-import removal). Run `mvn -f backend/pom.xml spotless:apply`
      # locally to fix.
      - name: Spotless format check
        run: mvn -B -ntp -f backend/pom.xml spotless:check

      # `verify` compiles, runs the module tests, emits the JaCoCo per-module
      # reports, and enforces the coverage floor (jacoco:check) — one gate.
      - name: Build, test + JaCoCo coverage gate
        run: mvn -B -ntp -f backend/pom.xml verify

      - name: Upload Surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: backend/**/target/surefire-reports/

  # ─── Docker build smoke test ────────────────────────────
  # Builds every deployable image on PRs so a Dockerfile regression is
  # caught before merge (previously only price-service was built, which
  # left the web image — and its standalone/Prisma wiring — and the two
  # other Java services completely unverified by CI). The matrix runs the
  # four builds in parallel, each with its own GHA cache scope so they
  # don't evict each other; fail-fast is off so one broken image still
  # lets the others report.
  docker:
    name: Docker Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [typescript, java]
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: price-service
            context: ./backend
            file: ./backend/price-service/Dockerfile
          - name: gateway
            context: ./backend
            file: ./backend/gateway/Dockerfile
          - name: ai-service
            context: ./backend
            file: ./backend/ai-service/Dockerfile
          - name: web
            context: .
            file: ./apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
